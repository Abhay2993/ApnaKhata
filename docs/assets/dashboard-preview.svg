    <text x="84" y="114" font-size="9" fill="#C0C0C0" text-anchor="middle" letter-spacing="2">OF 900</text>
  </g>

  <!-- right column: loan status -->
  <text x="238" y="170" font-size="9" fill="#C0C0C0" letter-spacing="2">WORKING CAPITAL</text>

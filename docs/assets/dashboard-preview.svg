  <circle cx="40" cy="792" r="3" fill="#C5A059"/>
  <text x="50" y="796" font-size="11" fill="#C5A059">PO sent to Sharma Distributors</text>
  <rect x="278" y="780" width="80" height="26" rx="8" fill="none" stroke="#C5A059"/>
  <text x="318" y="797" font-size="10" fill="#C5A059" font-weight="bold" text-anchor="middle" letter-spacing="1">ORDERED ✓</text>

  <rect x="332" y="30" width="14" height="7" rx="1.5" fill="#C0C0C0"/>

  <!-- header -->
  <text x="24" y="78" font-size="24" fill="#F5F5F7" font-family="Georgia, 'Times New Roman', serif">ApnaKhata</text>

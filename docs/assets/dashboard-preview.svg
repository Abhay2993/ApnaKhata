  <rect x="278" y="592" width="80" height="26" rx="8" fill="#C5A059"/>
  <text x="318" y="609" font-size="10" fill="#0B0C10" font-weight="bold" text-anchor="middle" letter-spacing="1">ORDER 96</text>

  <!-- alert row 2: warning -->
  <rect x="20" y="634" width="350" height="86" rx="12" fill="#1F2833" stroke="#C5A059" stroke-opacity="0.15"/>
  <text x="36" y="658" font-size="14" fill="#F5F5F7">Fortune Sunflower Oil 1L</text>
  <text x="36" y="674" font-size="10" fill="#C0C0C0">22 PCS left · Agarwal Trading Co.</text>
  <polyline points="282,672 288,670 294,670 300,668 306,672 312,664 318,670 324,668 330,668 336,670 342,664 348,668 354,670 358,668"

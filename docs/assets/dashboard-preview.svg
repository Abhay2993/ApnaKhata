  <circle cx="40" cy="698" r="3" fill="#D4AF37"/>
  <text x="50" y="702" font-size="11" fill="#D4AF37">Depletes in 5 days</text>
  <rect x="278" y="686" width="80" height="26" rx="8" fill="#C5A059"/>
  <text x="318" y="703" font-size="10" fill="#0B0C10" font-weight="bold" text-anchor="middle" letter-spacing="1">ORDER 48</text>

  <!-- alert row 3: ordered state -->
  <rect x="20" y="728" width="350" height="86" rx="12" fill="#1F2833" stroke="#C5A059" stroke-opacity="0.15"/>
  <text x="36" y="752" font-size="14" fill="#F5F5F7">Parle-G 800g Family Pack</text>
  <text x="36" y="768" font-size="10" fill="#C0C0C0">35 PCS left · Sharma Distributors</text>

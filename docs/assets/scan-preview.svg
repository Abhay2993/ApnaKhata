<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" font-family="Helvetica, Arial, sans-serif">
  <!-- ApnaKhata scan &amp; bill — rendered preview of mobile/src/screens/ScanScreen.tsx -->
  <rect x="1" y="1" width="388" height="842" rx="40" fill="#0B0C10" stroke="#33363D" stroke-width="2"/>

  <!-- status bar -->
  <text x="36" y="38" font-size="13" fill="#F5F5F7" font-weight="bold">9:41</text>
  <rect x="330" y="28" width="22" height="11" rx="3" fill="none" stroke="#C0C0C0" stroke-width="1"/>
  <rect x="332" y="30" width="14" height="7" rx="1.5" fill="#C0C0C0"/>

  <!-- header -->
  <text x="24" y="78" font-size="24" fill="#F5F5F7" font-family="Georgia, 'Times New Roman', serif">ApnaKhata</text>
  <text x="366" y="76" font-size="11" fill="#C0C0C0" text-anchor="end" letter-spacing="1">Scan &amp; Bill</text>

  <!-- mode toggle -->
  <rect x="20" y="94" width="350" height="46" rx="12" fill="#1F2833" stroke="#C5A059" stroke-opacity="0.2"/>
  <rect x="25" y="99" width="170" height="36" rx="9" fill="#C5A059"/>
  <text x="110" y="122" font-size="11" fill="#0B0C10" font-weight="bold" text-anchor="middle" letter-spacing="2">BILLING</text>
  <text x="282" y="122" font-size="11" fill="#C0C0C0" font-weight="bold" text-anchor="middle" letter-spacing="2">STOCK IN</text>

  <!-- viewfinder -->
  <rect x="20" y="156" width="350" height="256" rx="16" fill="#12151B" stroke="#C5A059" stroke-opacity="0.35"/>
  <!-- corner brackets -->
  <path d="M 70 206 L 70 186 L 90 186" fill="none" stroke="#C5A059" stroke-width="3" stroke-linecap="round"/>
  <path d="M 300 186 L 320 186 L 320 206 " fill="none" stroke="#C5A059" stroke-width="3" stroke-linecap="round"/>
  <path d="M 70 362 L 70 382 L 90 382" fill="none" stroke="#C5A059" stroke-width="3" stroke-linecap="round"/>
  <path d="M 300 382 L 320 382 L 320 362" fill="none" stroke="#C5A059" stroke-width="3" stroke-linecap="round"/>
  <!-- barcode -->
  <g fill="#F5F5F7">
    <rect x="126" y="240" width="4" height="66"/><rect x="134" y="240" width="2" height="66"/>
    <rect x="140" y="240" width="6" height="66"/><rect x="150" y="240" width="2" height="66"/>
    <rect x="156" y="240" width="4" height="66"/><rect x="164" y="240" width="8" height="66"/>
    <rect x="176" y="240" width="2" height="66"/><rect x="182" y="240" width="4" height="66"/>
    <rect x="190" y="240" width="6" height="66"/><rect x="200" y="240" width="2" height="66"/>
    <rect x="206" y="240" width="4" height="66"/><rect x="214" y="240" width="2" height="66"/>
    <rect x="220" y="240" width="8" height="66"/><rect x="232" y="240" width="2" height="66"/>
    <rect x="238" y="240" width="4" height="66"/><rect x="246" y="240" width="6" height="66"/>
    <rect x="256" y="240" width="2" height="66"/><rect x="262" y="240" width="4" height="66"/>
  </g>
  <text x="195" y="326" font-size="10" fill="#C0C0C0" text-anchor="middle" letter-spacing="2">8 9 0 1 0 3 0 7 3 1 2 3 4</text>
  <!-- scan line -->
  <line x1="80" y1="273" x2="310" y2="273" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.9"/>
  <text x="195" y="400" font-size="10" fill="#C0C0C0" text-anchor="middle">Align barcode within frame</text>

  <!-- status line -->
  <text x="24" y="436" font-size="11" fill="#C5A059">Added Tata Salt 1kg</text>

  <!-- cart -->
  <rect x="20" y="452" width="350" height="58" rx="12" fill="#1F2833" stroke="#C5A059" stroke-opacity="0.15"/>
  <text x="36" y="476" font-size="13" fill="#F5F5F7">Tata Salt 1kg</text>
  <text x="36" y="494" font-size="10" fill="#C0C0C0">2 × ₹28.00</text>
  <text x="354" y="486" font-size="13" fill="#F5F5F7" text-anchor="end">₹56.00</text>

  <rect x="20" y="518" width="350" height="58" rx="12" fill="#1F2833" stroke="#C5A059" stroke-opacity="0.15"/>
  <text x="36" y="542" font-size="13" fill="#F5F5F7">Parle-G 800g Family Pack</text>
  <text x="36" y="560" font-size="10" fill="#C0C0C0">1 × ₹98.00</text>
  <text x="354" y="552" font-size="13" fill="#F5F5F7" text-anchor="end">₹98.00</text>

  <rect x="20" y="584" width="350" height="58" rx="12" fill="#1F2833" stroke="#C5A059" stroke-opacity="0.15"/>
  <text x="36" y="608" font-size="13" fill="#F5F5F7">Fortune Sunflower Oil 1L</text>
  <text x="36" y="626" font-size="10" fill="#C0C0C0">1 × ₹165.00</text>
  <text x="354" y="618" font-size="13" fill="#F5F5F7" text-anchor="end">₹165.00</text>

  <!-- total + charge -->
  <line x1="20" y1="712" x2="370" y2="712" stroke="#C0C0C0" stroke-opacity="0.13"/>
  <text x="24" y="740" font-size="9" fill="#C0C0C0" letter-spacing="2">TOTAL</text>
  <text x="24" y="772" font-size="26" fill="#D4AF37" font-weight="bold">₹319.00</text>
  <rect x="262" y="738" width="108" height="42" rx="10" fill="#C5A059"/>
  <text x="316" y="764" font-size="11" fill="#0B0C10" font-weight="bold" text-anchor="middle" letter-spacing="2">CHARGE</text>
</svg>
